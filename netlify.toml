exports.handler = async (event) => {
  if (event.httpMethod !== "POST") {
    return {
      statusCode: 405,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ error: "Method not allowed" }),
    };
  }

  if (!process.env.STRIPE_SECRET_KEY) {
    console.error("STRIPE_SECRET_KEY environment variable is not set");
    return {
      statusCode: 500,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ error: "Payment service is not configured. Please contact the site owner." }),
    };
  }

  try {
    const stripe = require("stripe")(process.env.STRIPE_SECRET_KEY);
    const { items } = JSON.parse(event.body);

    if (!items || !items.length) {
      return {
        statusCode: 400,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ error: "No items provided" }),
      };
    }

    const line_items = items.map((item) => ({
      price_data: {
        currency: "usd",
        product_data: {
          name: item.name,
        },
        unit_amount: Math.round(item.price * 100),
      },
      quantity: item.quantity,
    }));

    const origin =
      event.headers.origin ||
      event.headers.referer?.replace(/\/+$/, "") ||
      "https://dedoakdecals.netlify.app";

    const session = await stripe.checkout.sessions.create({
      payment_method_types: ["card"],
      line_items,
      mode: "payment",
      success_url: `${origin}/success.html`,
      cancel_url: `${origin}/#collection`,
      shipping_address_collection: {
        allowed_countries: ["US", "CA"],
      },
    });

    return {
      statusCode: 200,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: session.url }),
    };
  } catch (err) {
    console.error("Stripe checkout error:", err.type, err.message);

    let userMessage;
    if (err.type === "StripeAuthenticationError") {
      userMessage = "Payment service authentication failed. Please contact the site owner.";
    } else if (
      err.type === "StripeInvalidRequestError" ||
      err.type === "StripePermissionError"
    ) {
      // Surface Stripe's message for account setup issues (e.g. live mode not activated)
      userMessage = err.message || "Payment request was rejected by the payment provider.";
    } else {
      userMessage = "Failed to create checkout session. Please try again.";
    }

    return {
      statusCode: 500,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ error: userMessage }),
    };
  }
};
